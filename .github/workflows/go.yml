# .github/workflows/daily-scraper.yml
name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 CEST (UTC+2)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.2'
          cache: true

      - name: Run scraper
        run: go run ./cmd/scr/
