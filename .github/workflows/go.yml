name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 CEST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: $RUNNER_TEMP/firebase-key.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scraper/go.mod
          cache: true
          cache-dependency-path: scraper/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/scripts/requirements.txt

      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > $RUNNER_TEMP/firebase-key.json

      - name: Run scraper
        run: go run ./cmd/scr/
        working-directory: scraper

      - name: Commit catalog name log
        run: |
          git config user.name "catalog-bot"
          git config user.email "catalog-bot@users.noreply.github.com"

          git add scraper/katalogi/catalog-names.json

          if ! git diff --cached --quiet; then
            git commit -m "Update catalog names ($(date +'%Y-%m-%d'))"
            git push
          else
            echo "No changes to commit"
          fi

