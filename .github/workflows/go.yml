name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 CEST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run scraper
        run: go run /scraper/cmd/scr/.

      - name: Commit used catalogue log
        run: |
          git config user.name "catalog-bot"
          git config user.email "catalog-bot@users.noreply.github.com"
      
          git add scraper/catalog-names.json
      
          if ! git diff --cached --quiet; then
            git commit -m "Update catalog names ($(date +'%Y-%m-%d'))"
            git push
          else
            echo "No changes to commit"
          fi
          
