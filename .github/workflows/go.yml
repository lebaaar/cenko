name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 CEST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Run scraper
        run: go run ./cmd/scr/
