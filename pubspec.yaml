name: cenko
description: "Track your spending and discover the best deals across grocery stores"
publish_to: "none"
version: 0.2.0+5

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.2+1
  cloud_functions: ^6.2.0
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.9
  device_info_plus: ^13.1.0
  firebase_ai: ^3.11.0
  firebase_app_check: ^0.4.3
  supabase_flutter: ^2.8.0
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  flutter_dotenv: ^6.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.2.4
  go_router: ^17.1.0
  google_fonts: ^6.2.1
  google_mlkit_text_recognition: ^0.15.1
  google_sign_in: ^7.2.0
  http: ^1.3.0
  intl: ^0.20.2
  image: ^4.8.0
  image_picker: ^1.2.0
  in_app_update: ^4.2.5
  internet_connection_checker_plus: ^3.0.0
  mobile_scanner: ^7.2.0
  package_info_plus: ^10.1.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#145750"
  color_dark: "#145750"
  image: assets/cenko/logo.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#145750"
    color_dark: "#145750"
    image: assets/cenko/logo.png

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/icons/barcode_scanner.svg
    - assets/cenko/logo.png
    - assets/cenko/logo_rounded.png
    - assets/stores/spar.png
    - assets/stores/mercator.webp
    - assets/stores/tus.png
    - assets/stores/tus-drogerija.jpg
    - assets/stores/hofer.png
    - assets/stores/lidl.png
    - assets/stores/eurospin.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Custom fonts - each entry should have a "family" key with the font family name, and a "fonts" key with a list giving the asset and other descriptors for the font.
  # Example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
