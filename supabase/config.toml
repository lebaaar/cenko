# Supabase project configuration
# https://supabase.com/docs/guides/cli/config

project_id = "thxuthzspysisqqoxlhq"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.delete-my-account]
# No extra config needed — SUPABASE_URL, SUPABASE_ANON_KEY and
# SUPABASE_SERVICE_ROLE_KEY are injected automatically by the edge runtime.
